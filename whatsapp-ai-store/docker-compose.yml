services:
  postgres:
    image: postgres:16
    container_name: postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: evolution
    ports:
      - "5432:5432"

  evolution-api:
    image: atendai/evolution-api:v2.0.9
    container_name: evolution-api
    restart: always
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_API_KEY=123456

      # 🔥 CORRETO AGORA
      - DATABASE_PROVIDER=postgresql
      - DB_CONNECTION_URI=postgresql://postgres:123456@postgres:5432/evolution